name: "Release"

on:
  release:
    types:
      - "published"
      - "prereleased"

env:
  COMPONENT_NAME: petkit

permissions: {}

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Checkout the repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # Version 6.0.3

      - name: "Adjust version number"
        shell: bash
        run: |
          version="${{ github.event.release.tag_name }}"
          yq e -P -o=json \
            -i ".version = \"${version}\"" \
            "${{ github.workspace }}/custom_components/${{ env.COMPONENT_NAME }}/manifest.json"

      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/${{ env.COMPONENT_NAME }}"
          zip ${{ env.COMPONENT_NAME }}.zip -r ./

      - name: "Upload the ZIP file to the release"
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # Version 3.0.1
        with:
          files: ${{ github.workspace }}/custom_components/${{ env.COMPONENT_NAME }}/${{ env.COMPONENT_NAME }}.zip
